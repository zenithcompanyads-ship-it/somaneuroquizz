
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: var(--font-sans); }
  .quiz-wrap { max-width: 640px; margin: 0 auto; padding: 1.5rem 1rem 3rem; }
  .logo-area { text-align: center; margin-bottom: 2rem; }
  .logo-area h1 { font-size: 22px; font-weight: 500; color: var(--color-text-primary); }
  .logo-area p { font-size: 14px; color: var(--color-text-secondary); margin-top: 4px; }
  .progress-bar-wrap { background: var(--color-background-secondary); border-radius: 99px; height: 6px; margin-bottom: 2rem; overflow: hidden; }
  .progress-bar { height: 100%; background: #7F77DD; border-radius: 99px; transition: width 0.4s ease; }
  .step-label { font-size: 12px; color: var(--color-text-tertiary); margin-bottom: 0.5rem; letter-spacing: 0.04em; text-transform: uppercase; }
  .question { font-size: 18px; font-weight: 500; color: var(--color-text-primary); margin-bottom: 1.5rem; line-height: 1.4; }
  .options { display: flex; flex-direction: column; gap: 10px; }
  .option-btn { display: flex; align-items: center; gap: 12px; padding: 14px 16px; border: 0.5px solid var(--color-border-tertiary); border-radius: var(--border-radius-lg); background: var(--color-background-primary); cursor: pointer; font-size: 15px; color: var(--color-text-primary); text-align: left; transition: border-color 0.15s, background 0.15s; }
  .option-btn:hover { border-color: #7F77DD; background: #EEEDFE; color: #3C3489; }
  .option-btn.selected { border-color: #7F77DD; background: #EEEDFE; color: #3C3489; border-width: 1.5px; }
  .option-icon { width: 36px; height: 36px; border-radius: 8px; background: #EEEDFE; display: flex; align-items: center; justify-content: center; flex-shrink: 0; font-size: 18px; }
  .field-wrap { display: flex; flex-direction: column; gap: 14px; }
  .field-wrap label { font-size: 13px; color: var(--color-text-secondary); margin-bottom: 4px; display: block; }
  .field-wrap input { width: 100%; padding: 12px 14px; border: 0.5px solid var(--color-border-secondary); border-radius: var(--border-radius-md); font-size: 15px; background: var(--color-background-primary); color: var(--color-text-primary); }
  .field-wrap input:focus { outline: none; border-color: #7F77DD; box-shadow: 0 0 0 2px #EEEDFE; }
  .nav { display: flex; gap: 10px; margin-top: 2rem; }
  .btn-back { flex: 0 0 auto; padding: 12px 20px; border: 0.5px solid var(--color-border-secondary); border-radius: var(--border-radius-md); background: transparent; color: var(--color-text-secondary); cursor: pointer; font-size: 15px; }
  .btn-next { flex: 1; padding: 13px 20px; border: none; border-radius: var(--border-radius-md); background: #534AB7; color: #fff; cursor: pointer; font-size: 15px; font-weight: 500; transition: background 0.15s; }
  .btn-next:hover { background: #3C3489; }
  .btn-next:disabled { background: var(--color-background-secondary); color: var(--color-text-tertiary); cursor: not-allowed; }
  .hero { text-align: center; padding: 1rem 0 1.5rem; }
  .hero-badge { display: inline-block; background: #EEEDFE; color: #534AB7; font-size: 12px; padding: 4px 14px; border-radius: 99px; margin-bottom: 1rem; }
  .hero h2 { font-size: 22px; font-weight: 500; color: var(--color-text-primary); line-height: 1.35; margin-bottom: 0.75rem; }
  .hero p { font-size: 14px; color: var(--color-text-secondary); line-height: 1.6; }
  .divider { border: none; border-top: 0.5px solid var(--color-border-tertiary); margin: 1.5rem 0; }
  .finish-card { background: var(--color-background-secondary); border-radius: var(--border-radius-lg); padding: 1.5rem; text-align: center; }
  .finish-card h3 { font-size: 18px; font-weight: 500; margin-bottom: 0.5rem; }
  .finish-card p { font-size: 14px; color: var(--color-text-secondary); margin-bottom: 1.25rem; line-height: 1.5; }
  .whatsapp-btn { display: flex; align-items: center; justify-content: center; gap: 10px; width: 100%; padding: 15px 20px; background: #25D366; color: #fff; border: none; border-radius: var(--border-radius-md); font-size: 16px; font-weight: 500; cursor: pointer; text-decoration: none; transition: background 0.15s; }
  .whatsapp-btn:hover { background: #1aad53; }
  .tag { display: inline-block; background: #EEEDFE; color: #534AB7; font-size: 12px; padding: 3px 10px; border-radius: 99px; margin: 2px; }
  .summary-box { background: var(--color-background-primary); border: 0.5px solid var(--color-border-tertiary); border-radius: var(--border-radius-lg); padding: 1rem 1.25rem; margin-bottom: 1.5rem; text-align: left; }
  .summary-row { display: flex; justify-content: space-between; font-size: 13px; padding: 4px 0; }
  .summary-row span:first-child { color: var(--color-text-secondary); }
  .summary-row span:last-child { font-weight: 500; color: var(--color-text-primary); }
</style>

<div class="quiz-wrap">
  <div class="logo-area">
    <div style="display:inline-flex;align-items:center;gap:8px;margin-bottom:6px;">
      <div style="width:32px;height:32px;background:#534AB7;border-radius:8px;display:flex;align-items:center;justify-content:center;">
        <i class="ti ti-brain" style="color:#fff;font-size:18px;" aria-hidden="true"></i>
      </div>
      <span style="font-size:18px;font-weight:500;color:var(--color-text-primary);">Soma Neuromodulação</span>
    </div>
  </div>

  <div class="progress-bar-wrap">
    <div class="progress-bar" id="progress" style="width:0%"></div>
  </div>

  <div id="quiz-container"></div>
</div>

<script>
const TOTAL_STEPS = 8;
let current = 0;
let data = {
  nome: '', cidade: '', telefone: '',
  objetivo: '', servico: '', tempo: '', frequencia: '', limitacao: '', expectativa: ''
};

const steps = [
  { type: 'intro' },
  { type: 'fields' },
  {
    type: 'choice', key: 'objetivo',
    question: 'Qual é o principal objetivo com o tratamento?',
    options: [
      { label: 'Reabilitação — recuperar funções motoras, fala ou equilíbrio', icon: '🧠', value: 'reabilitacao' },
      { label: 'Saúde mental — depressão, ansiedade ou insônia', icon: '💜', value: 'saude_mental' },
      { label: 'Dor crônica — reduzir ou controlar a dor', icon: '⚡', value: 'dor_cronica' },
      { label: 'Ainda não tenho certeza, quero entender as opções', icon: '💡', value: 'nao_sei' },
    ]
  },
  {
    type: 'choice_condicional', key: 'servico',
    question: 'Qual área de reabilitação você está buscando?',
    showIf: (d) => d.objetivo === 'reabilitacao',
    options: [
      { label: 'Motora — força, equilíbrio, capacidade de caminhar', icon: '🦾', value: 'motora' },
      { label: 'Linguagem / fala — comunicação e processamento cognitivo', icon: '🗣️', value: 'linguagem' },
      { label: 'Vestibular — tontura, vertigem, coordenação', icon: '🌀', value: 'vestibular' },
      { label: 'Cognitiva — memória, atenção, planejamento', icon: '🔍', value: 'cognitiva' },
    ]
  },
  {
    type: 'choice', key: 'tempo',
    question: 'Há quanto tempo você convive com essa condição?',
    options: [
      { label: 'Menos de 6 meses', icon: '📅', value: 'menos_6m' },
      { label: 'Entre 6 meses e 2 anos', icon: '🗓️', value: '6m_2a' },
      { label: 'Mais de 2 anos', icon: '📆', value: 'mais_2a' },
      { label: 'Não sei precisar', icon: '❓', value: 'nao_sei' },
    ]
  },
  {
    type: 'choice', key: 'frequencia',
    question: 'Você já realizou algum tratamento anteriormente?',
    options: [
      { label: 'Sim, estou em tratamento atualmente', icon: '✅', value: 'em_tratamento' },
      { label: 'Já fiz, mas interrompi', icon: '⏸️', value: 'interrompido' },
      { label: 'Nunca fiz nenhum tratamento', icon: '🔰', value: 'nunca' },
    ]
  },
  {
    type: 'choice', key: 'limitacao',
    question: 'O quanto essa condição impacta sua rotina hoje?',
    options: [
      { label: 'Bastante — dificulta atividades básicas do dia a dia', icon: '🔴', value: 'bastante' },
      { label: 'Moderadamente — com esforço ainda consigo fazer quase tudo', icon: '🟡', value: 'moderado' },
      { label: 'Pouco — busco melhorar, mas ainda funciono bem', icon: '🟢', value: 'pouco' },
    ]
  },
  { type: 'result' }
];

function getProgress(step) {
  if (step === 0) return 0;
  if (step >= TOTAL_STEPS - 1) return 100;
  return Math.round((step / (TOTAL_STEPS - 2)) * 100);
}

function getVisibleSteps() {
  return steps.filter(s => {
    if (s.type === 'choice_condicional') return s.showIf(data);
    return true;
  });
}

function renderStep(idx) {
  const visible = getVisibleSteps();
  const step = visible[idx];
  const pct = idx === 0 ? 0 : Math.round(((idx) / (visible.length - 1)) * 100);
  document.getElementById('progress').style.width = pct + '%';
  const container = document.getElementById('quiz-container');

  if (step.type === 'intro') {
    container.innerHTML = `
      <div class="hero">
        <div class="hero-badge">Avaliação gratuita</div>
        <h2>Descubra como a Neuromodulação pode transformar sua qualidade de vida</h2>
        <p>Responda algumas perguntas rápidas para que nossa equipe entenda exatamente o que você precisa e entre em contato com as melhores opções para você.</p>
      </div>
      <hr class="divider">
      <div style="display:flex;flex-direction:column;gap:10px;margin-bottom:2rem;">
        <div style="display:flex;align-items:center;gap:10px;font-size:14px;color:var(--color-text-secondary);">
          <i class="ti ti-clock" style="color:#534AB7;font-size:18px;" aria-hidden="true"></i> Leva menos de 2 minutos
        </div>
        <div style="display:flex;align-items:center;gap:10px;font-size:14px;color:var(--color-text-secondary);">
          <i class="ti ti-lock" style="color:#534AB7;font-size:18px;" aria-hidden="true"></i> Seus dados são confidenciais
        </div>
        <div style="display:flex;align-items:center;gap:10px;font-size:14px;color:var(--color-text-secondary);">
          <i class="ti ti-message-circle" style="color:#534AB7;font-size:18px;" aria-hidden="true"></i> Nossa equipe entra em contato pelo WhatsApp
        </div>
      </div>
      <button class="btn-next" onclick="nextStep()" style="width:100%;">Começar agora</button>
    `;
    return;
  }

  if (step.type === 'fields') {
    container.innerHTML = `
      <div class="step-label">Seus dados</div>
      <p class="question">Antes de tudo, como podemos te chamar e entrar em contato?</p>
      <div class="field-wrap">
        <div>
          <label>Nome completo</label>
          <input type="text" id="f-nome" placeholder="Seu nome" value="${data.nome}" />
        </div>
        <div>
          <label>Cidade</label>
          <input type="text" id="f-cidade" placeholder="Sua cidade" value="${data.cidade}" />
        </div>
        <div>
          <label>WhatsApp (com DDD)</label>
          <input type="tel" id="f-tel" placeholder="(51) 99999-9999" value="${data.telefone}" />
        </div>
      </div>
      <div class="nav">
        <button class="btn-back" onclick="prevStep()"><i class="ti ti-arrow-left" aria-hidden="true"></i></button>
        <button class="btn-next" onclick="saveFields()">Continuar</button>
      </div>
    `;
    return;
  }

  if (step.type === 'choice' || step.type === 'choice_condicional') {
    const opts = step.options.map(o => `
      <button class="option-btn ${data[step.key] === o.value ? 'selected' : ''}" onclick="selectOption('${step.key}','${o.value}',this)">
        <span class="option-icon" aria-hidden="true">${o.icon}</span>
        <span>${o.label}</span>
      </button>
    `).join('');
    container.innerHTML = `
      <div class="step-label">Passo ${idx} de ${visible.length - 2}</div>
      <p class="question">${step.question}</p>
      <div class="options">${opts}</div>
      <div class="nav">
        <button class="btn-back" onclick="prevStep()"><i class="ti ti-arrow-left" aria-hidden="true"></i></button>
        <button class="btn-next" id="btn-next-choice" onclick="nextStep()" ${data[step.key] ? '' : 'disabled'}>Continuar</button>
      </div>
    `;
    return;
  }

  if (step.type === 'result') {
    const servicoLabel = {
      reabilitacao: 'Reabilitação',
      saude_mental: 'Saúde Mental',
      dor_cronica: 'Dor Crônica',
      nao_sei: 'A definir com especialista'
    }[data.objetivo] || data.objetivo;

    const subLabel = {
      motora: 'Reabilitação Motora',
      linguagem: 'Reabilitação da Linguagem',
      vestibular: 'Reabilitação Vestibular',
      cognitiva: 'Reabilitação Cognitiva'
    }[data.servico] || '';

    const tempoLabel = {
      menos_6m: 'Menos de 6 meses',
      '6m_2a': 'Entre 6 meses e 2 anos',
      mais_2a: 'Mais de 2 anos',
      nao_sei: 'Não sabe precisar'
    }[data.tempo] || '';

    const freqLabel = {
      em_tratamento: 'Em tratamento atualmente',
      interrompido: 'Já fez, interrompeu',
      nunca: 'Nunca fez tratamento'
    }[data.frequencia] || '';

    const impactoLabel = {
      bastante: 'Alto impacto na rotina',
      moderado: 'Impacto moderado',
      pouco: 'Baixo impacto'
    }[data.limitacao] || '';

    const msg = buildWAMessage(servicoLabel, subLabel, tempoLabel, freqLabel, impactoLabel);

    container.innerHTML = `
      <div style="text-align:center;margin-bottom:1.5rem;">
        <div style="width:56px;height:56px;background:#EEEDFE;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 1rem;">
          <i class="ti ti-check" style="color:#534AB7;font-size:28px;" aria-hidden="true"></i>
        </div>
        <h3 style="font-size:20px;font-weight:500;margin-bottom:6px;">Tudo certo, ${data.nome.split(' ')[0]}!</h3>
        <p style="font-size:14px;color:var(--color-text-secondary);line-height:1.5;">Nossa equipe vai analisar seu perfil e entrar em contato com a melhor indicação para você.</p>
      </div>
      <div class="summary-box">
        <div class="summary-row"><span>Nome</span><span>${data.nome}</span></div>
        <div class="summary-row"><span>Cidade</span><span>${data.cidade}</span></div>
        <div class="summary-row"><span>Área de interesse</span><span>${subLabel || servicoLabel}</span></div>
        <div class="summary-row"><span>Tempo de condição</span><span>${tempoLabel}</span></div>
        <div class="summary-row"><span>Tratamentos anteriores</span><span>${freqLabel}</span></div>
        <div class="summary-row"><span>Impacto na rotina</span><span>${impactoLabel}</span></div>
      </div>
      <a class="whatsapp-btn" href="${msg}" target="_blank">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347z"/><path d="M12 0C5.373 0 0 5.373 0 12c0 2.125.557 4.126 1.532 5.856L.057 23.882l6.19-1.621A11.94 11.94 0 0012 24c6.627 0 12-5.373 12-12S18.627 0 12 0zm0 21.818a9.818 9.818 0 01-5.006-1.37l-.359-.213-3.723.976.993-3.625-.234-.373A9.818 9.818 0 012.182 12C2.182 6.575 6.575 2.182 12 2.182S21.818 6.575 21.818 12 17.425 21.818 12 21.818z"/></svg>
        Enviar para o WhatsApp da Soma
      </a>
      <p style="text-align:center;font-size:12px;color:var(--color-text-tertiary);margin-top:12px;">Ao clicar, você será redirecionado para o WhatsApp com as informações preenchidas automaticamente.</p>
    `;
    return;
  }
}

function buildWAMessage(servicoLabel, subLabel, tempoLabel, freqLabel, impactoLabel) {
  const phone = '5551999999999';
  const area = subLabel || servicoLabel;
  const text = `Olá! Preenchi o quiz da Soma Neuromodulação e gostaria de saber mais.

*📋 Resumo do meu perfil:*
• Nome: ${data.nome}
• Cidade: ${data.cidade}
• WhatsApp: ${data.telefone}
• Área de interesse: ${area}
• Há quanto tempo: ${tempoLabel}
• Tratamentos anteriores: ${freqLabel}
• Impacto na rotina: ${impactoLabel}

Aguardo o contato da equipe!`;
  return `https://wa.me/${phone}?text=${encodeURIComponent(text)}`;
}

function selectOption(key, value, btn) {
  data[key] = value;
  document.querySelectorAll('.option-btn').forEach(b => b.classList.remove('selected'));
  btn.classList.add('selected');
  const nextBtn = document.getElementById('btn-next-choice');
  if (nextBtn) nextBtn.disabled = false;
}

function saveFields() {
  const nome = document.getElementById('f-nome').value.trim();
  const cidade = document.getElementById('f-cidade').value.trim();
  const tel = document.getElementById('f-tel').value.trim();
  if (!nome || !cidade || !tel) {
    alert('Por favor, preencha todos os campos para continuar.');
    return;
  }
  data.nome = nome; data.cidade = cidade; data.telefone = tel;
  current++;
  renderStep(current);
}

function nextStep() {
  current++;
  renderStep(current);
}

function prevStep() {
  if (current > 0) { current--; renderStep(current); }
}

renderStep(0);
</script>
